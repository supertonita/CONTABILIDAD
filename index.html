<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contabilidad Toñita </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 p-4 font-sans text-slate-800">

    <header class="text-center mb-6">
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight text-center">Contabilidad Corinto</h1>
        <div id="status" class="text-[10px] text-orange-500 font-bold uppercase text-center">Conectando a la nube...</div>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-emerald-600 rounded-2xl p-4 shadow-lg text-white">
            <p class="text-[10px] uppercase font-bold opacity-80 tracking-widest">Total Ventas</p>
            <h2 id="totalVentas" class="text-xl font-black mt-1 text-white">$0.00</h2>
        </div>
        <div class="bg-slate-800 rounded-2xl p-4 shadow-lg text-white">
            <p class="text-[10px] uppercase font-bold opacity-80 tracking-widest">Total Compras CF</p>
            <h2 id="totalCompras" class="text-xl font-black mt-1 text-white">$0.00</h2>
        </div>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
        <div class="flex gap-2 mb-4">
            <button onclick="setTipo('Venta')" id="btnVenta" class="flex-1 p-3 rounded-xl bg-emerald-500 text-white font-bold transition-all shadow-md text-sm">VENTA</button>
            <button onclick="setTipo('Compra')" id="btnCompra" class="flex-1 p-3 rounded-xl bg-slate-200 text-slate-600 font-bold transition-all text-sm">COMPRA CF</button>
        </div>
        
        <div class="space-y-4">
            <input type="text" id="usuario" placeholder="Tu nombre (ej. Frank)" class="w-full p-3 bg-slate-50 border rounded-xl text-sm outline-none">
            <input type="number" id="monto" placeholder="Monto exacto ($)" step="0.01" class="w-full p-4 bg-slate-100 rounded-xl text-xl font-bold outline-none focus:ring-2 focus:ring-slate-400">
            <input type="text" id="nota" placeholder="Concepto o proveedor..." class="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-slate-400">
            <button id="btnGuardar" onclick="guardarRegistro()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-lg active:scale-95 transition-transform">
                Registrar Datos
            </button>
        </div>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6">
        <div class="grid grid-cols-2 gap-2">
            <input type="date" id="fechaFiltro" onchange="actualizarUI()" class="p-3 bg-slate-50 border rounded-xl text-sm outline-none">
            <button onclick="exportarExcel()" class="bg-green-100 text-green-700 px-4 rounded-xl font-bold text-xs flex items-center justify-center gap-2">
                📊 EXCEL
            </button>
        </div>
        <button onclick="borrarTodoNube()" class="w-full mt-4 text-[10px] text-red-400 font-bold uppercase tracking-widest text-center">Limpiar base de datos (Nube)</button>
    </div>

    <div id="listaContenedor" class="space-y-3 pb-10"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqfr2LvgnEN9-ZOaJwMcqIaqCOEaSfD8o",
            authDomain: "micontabilidad-a7b2d.firebaseapp.com",
            projectId: "micontabilidad-a7b2d",
            storageBucket: "micontabilidad-a7b2d.firebasestorage.app",
            messagingSenderId: "177372990974",
            appId: "1:177372990974:web:7b62fbded941a9a4e884af"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "movimientos");
        const PIN_SEGURIDAD = "1234"; 

        let registros = [];
        let tipoSeleccionado = 'Venta';
        let editandoId = null;

        window.setTipo = (tipo) => {
            tipoSeleccionado = tipo;
            const bVenta = document.getElementById('btnVenta');
            const bCompra = document.getElementById('btnCompra');
            bVenta.className = tipo === 'Venta' ? 'flex-1 p-3 rounded-xl bg-emerald-500 text-white font-bold shadow-md text-sm' : 'flex-1 p-3 rounded-xl bg-slate-200 text-slate-600 font-bold text-sm';
            bCompra.className = tipo === 'Compra' ? 'flex-1 p-3 rounded-xl bg-slate-800 text-white font-bold shadow-md text-sm' : 'flex-1 p-3 rounded-xl bg-slate-200 text-slate-600 font-bold text-sm';
        };

        window.guardarRegistro = async () => {
            const monto = parseFloat(document.getElementById('monto').value);
            const nota = document.getElementById('nota').value;
            const user = document.getElementById('usuario').value || "Anónimo";

            if (!monto) return alert("Ingresa un monto, parce.");

            try {
                if (editandoId) {
                    await updateDoc(doc(db, "movimientos", editandoId), {
                        monto, nota, tipo: tipoSeleccionado, usuario: user
                    });
                    editandoId = null;
                    document.getElementById('btnGuardar').innerText = "Registrar en la Nube";
                    document.getElementById('btnGuardar').classList.replace('bg-blue-600', 'bg-slate-900');
                } else {
                    await addDoc(colRef, {
                        monto, nota, tipo: tipoSeleccionado, usuario: user,
                        fecha: new Date().toISOString().split('T')[0],
                        creadoEn: Date.now()
                    });
                }
                document.getElementById('monto').value = '';
                document.getElementById('nota').value = '';
            } catch (e) {
                alert("Error: " + e.message);
            }
        };

        window.editarRegistro = (id) => {
            const reg = registros.find(r => r.id === id);
            document.getElementById('monto').value = reg.monto;
            document.getElementById('nota').value = reg.nota;
            document.getElementById('usuario').value = reg.usuario;
            window.setTipo(reg.tipo);
            editandoId = id;
            document.getElementById('btnGuardar').innerText = "Actualizar Registro";
            document.getElementById('btnGuardar').classList.replace('bg-slate-900', 'bg-blue-600');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.eliminarRegistro = async (id) => {
            if (confirm("¿Eliminar este registro de la nube?")) {
                await deleteDoc(doc(db, "movimientos", id));
            }
        };

        window.borrarTodoNube = async () => {
            const pass = prompt("Ingresa el código de seguridad para borrar TODO de la nube:");
            if (pass === PIN_SEGURIDAD) {
                if (confirm("¿Estás 100% seguro? Se borrarán los datos de todos los teléfonos.")) {
                    const querySnapshot = await getDocs(colRef);
                    const batch = writeBatch(db);
                    querySnapshot.forEach((doc) => {
                        batch.delete(doc.ref);
                    });
                    await batch.commit();
                    alert("Base de datos limpiada.");
                }
            } else if (pass !== null) {
                alert("Código incorrecto.");
            }
        };

        window.exportarExcel = () => {
            const ws = XLSX.utils.json_to_sheet(registros.map(r => ({
                Fecha: r.fecha, Tipo: r.tipo, Concepto: r.nota, Monto: r.monto, Usuario: r.usuario
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Contabilidad");
            XLSX.writeFile(wb, "Reporte_Cloud.xlsx");
        };

        const q = query(colRef, orderBy("creadoEn", "desc"));
        onSnapshot(q, (snapshot) => {
            registros = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            document.getElementById('status').innerText = "⚡ Sincronizado";
            document.getElementById('status').className = "text-[10px] text-emerald-500 font-bold uppercase text-center";
            window.actualizarUI();
        });

        window.actualizarUI = () => {
            const lista = document.getElementById('listaContenedor');
            const fFecha = document.getElementById('fechaFiltro').value;
            lista.innerHTML = '';
            let vTotal = 0, cTotal = 0;

            registros.filter(r => !fFecha || r.fecha === fFecha).forEach(r => {
                if (r.tipo === 'Venta') vTotal += r.monto;
                else cTotal += r.monto;

                const card = document.createElement('div');
                card.className = `bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border-l-4 ${r.tipo === 'Venta' ? 'border-emerald-500' : 'border-slate-800'}`;
                card.innerHTML = `
                    <div class="flex-1">
                        <p class="font-bold text-slate-700 text-sm">${r.nota}</p>
                        <p class="text-[10px] text-slate-400 font-medium">${r.fecha} • <b>${r.usuario}</b></p>
                    </div>
                    <div class="text-right flex items-center gap-3">
                        <p class="font-black ${r.tipo === 'Venta' ? 'text-emerald-600' : 'text-slate-800'}">$${r.monto.toFixed(2)}</p>
                        <div class="flex flex-col gap-1">
                            <button onclick="editarRegistro('${r.id}')" class="text-blue-500 text-[10px] font-bold bg-blue-50 px-2 py-1 rounded">Edit</button>
                            <button onclick="eliminarRegistro('${r.id}')" class="text-red-400 text-[10px] font-bold">Borrar</button>
                        </div>
                    </div>`;
                lista.appendChild(card);
            });

            document.getElementById('totalVentas').innerText = `$${vTotal.toFixed(2)}`;
            document.getElementById('totalCompras').innerText = `$${cTotal.toFixed(2)}`;
        };
    </script>
</body>
</html>
